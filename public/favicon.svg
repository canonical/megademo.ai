<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- dark background with slight rounding -->
  <rect width="32" height="32" rx="3" fill="#05050f"/>

  <defs>
    <!-- vertical gradient: cyan → purple → pink, matching the logo -->
    <linearGradient id="lg" x1="0" y1="8" x2="0" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#9933ff"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <!-- soft glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Pixel-art "ai" — each ■ is a 3×3 rectangle.
    "a" glyph (4 cols × 5 rows) starts at x=7, y=8
    "i" glyph (1 col × 5 rows, dot+gap+body) starts at x=22, y=8
    Layout centered: 7px left margin, 7px right margin.

    "a" shape:
      . ■ ■ .
      ■ . . ■
      ■ ■ ■ ■
      ■ . . ■
      ■ . . ■
  -->
  <g fill="url(#lg)" filter="url(#glow)">
    <!-- "a" row 0 (y=8) -->
    <rect x="10" y="8"  width="3" height="3"/>
    <rect x="13" y="8"  width="3" height="3"/>
    <!-- "a" row 1 (y=11) -->
    <rect x="7"  y="11" width="3" height="3"/>
    <rect x="16" y="11" width="3" height="3"/>
    <!-- "a" row 2 – crossbar (y=14) -->
    <rect x="7"  y="14" width="3" height="3"/>
    <rect x="10" y="14" width="3" height="3"/>
    <rect x="13" y="14" width="3" height="3"/>
    <rect x="16" y="14" width="3" height="3"/>
    <!-- "a" row 3 (y=17) -->
    <rect x="7"  y="17" width="3" height="3"/>
    <rect x="16" y="17" width="3" height="3"/>
    <!-- "a" row 4 (y=20) -->
    <rect x="7"  y="20" width="3" height="3"/>
    <rect x="16" y="20" width="3" height="3"/>

    <!-- "i" dot (y=8) -->
    <rect x="22" y="8"  width="3" height="3"/>
    <!-- "i" body (gap at y=11, body from y=14) -->
    <rect x="22" y="14" width="3" height="3"/>
    <rect x="22" y="17" width="3" height="3"/>
    <rect x="22" y="20" width="3" height="3"/>
  </g>
</svg>
