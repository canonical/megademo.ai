services:
  - type: web
    name: megademo-ai
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm ci && npm run scss
    startCommand: node app.js
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: BASE_URL
        value: https://megademo.ai

      - key: KIOSK_INTERVAL
        value: "30"

      - key: SUMMARY_CRON
        value: "0 8,12,17 * * *"

      - key: RATE_LIMIT_GLOBAL
        value: "500"

      - key: RATE_LIMIT_AUTH
        value: "100"

      # Secrets
      - key: MONGODB_URI
        sync: false

      - key: SESSION_SECRET
        sync: false

      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

      # When set, OIDC replaces GitHub OAuth
      # Redirect URI: https://megademo.ai/auth/oidc/callback
      - key: OIDC_ISSUER_URL
        sync: false

      - key: OIDC_CLIENT_ID
        sync: false

      - key: OIDC_CLIENT_SECRET
        sync: false

      # Optional
      - key: GITHUB_TOKEN
        sync: false

      - key: MATTERMOST_WEBHOOK_URL
        sync: false

      # @canonical.com email sign-in fallback
      - key: ALLOW_CANONICAL_EMAIL_FALLBACK
        value: "false"

      # Persistent uploads directory (Render disk mount path)
      - key: UPLOADS_DIR
        value: /data/uploads

    disk:
      name: uploads
      mountPath: /data/uploads
      sizeGB: 1
